services:
  backend:
    depends_on:
      supabase-bootstrap:
        condition: service_completed_successfully
    environment:
      SUPABASE_MODE: local
      SUPABASE_URL: http://supabase-gateway:8000
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoiZGVlcHBhdGllbnQtbG9jYWwiLCJleHAiOjIwOTA0MjIxNzJ9.uRGH9GTk1z_PUYfkyC-SwKPBRCJedXoJxPw36270vDE

  supabase-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "55432:5432"
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./supabase/init:/docker-entrypoint-initdb.d:ro

  supabase-rest:
    image: postgrest/postgrest:v12.2.12
    depends_on:
      supabase-bootstrap:
        condition: service_completed_successfully
    environment:
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_SCHEMA: public
      PGRST_DB_URI: postgres://authenticator:authenticator@supabase-db:5432/postgres
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_JWT_SECRET: local-development-jwt-secret-for-deeppatient-marketing
      PGRST_SERVER_PROXY_URI: http://localhost:55431

  supabase-auth:
    image: supabase/gotrue:v2.186.0
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:55431
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@supabase-db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:5173
      GOTRUE_URI_ALLOW_LIST: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5173/admin,http://127.0.0.1:5173/admin,http://localhost:5173/admin/login,http://127.0.0.1:5173/admin/login
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_SECRET: local-development-jwt-secret-for-deeppatient-marketing
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"
      GOTRUE_SMS_AUTOCONFIRM: "false"

  supabase-gateway:
    image: nginx:1.27-alpine
    depends_on:
      supabase-rest:
        condition: service_started
      supabase-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "55431:8000"
    volumes:
      - ./supabase/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  supabase-bootstrap:
    image: postgres:16-alpine
    depends_on:
      supabase-db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      PGDATABASE: postgres
      PGHOST: supabase-db
      PGPASSWORD: postgres
      PGPORT: "5432"
      PGUSER: postgres
    restart: "no"
    volumes:
      - ./supabase:/workspace/supabase:ro
    command: ["/bin/sh", "/workspace/supabase/scripts/bootstrap.sh"]

volumes:
  supabase_db_data:
